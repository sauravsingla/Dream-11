name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: pytest -q

      - name: Reproduce the synthetic reference experiment
        run: |
          dream11-reproduce \
            --input data/example_players.csv \
            --risk-values 0 0.5 1 2 5 10 \
            --solver pulp \
            --output-dir /tmp/dream11-paper-experiments

      - name: Compare results with the committed reference
        run: |
          python - <<'PY'
          from pathlib import Path
          import numpy as np
          import pandas as pd

          expected = pd.read_csv("results/synthetic_reference/experiment_summary.csv")
          actual = pd.read_csv("/tmp/dream11-paper-experiments/experiment_summary.csv")

          assert actual["risk_aversion"].tolist() == expected["risk_aversion"].tolist()
          for column in ["captain", "vice_captain", "player_type_counts", "real_team_counts"]:
              assert actual[column].tolist() == expected[column].tolist(), column

          for column in [
              "credits_used",
              "expected_score_with_multipliers",
              "total_score_risk",
              "risk_adjusted_objective",
          ]:
              assert np.allclose(actual[column], expected[column], rtol=1e-7, atol=1e-7), column

          for actual_players, expected_players in zip(
              actual["selected_players"], expected["selected_players"]
          ):
              assert set(actual_players.split("; ")) == set(expected_players.split("; "))

          output = Path("/tmp/dream11-paper-experiments")
          assert (output / "run_metadata.json").is_file()
          assert (output / "expected_score_vs_risk_aversion.png").is_file()
          assert (output / "team_risk_vs_risk_aversion.png").is_file()
          assert len(list(output.glob("selected_team_risk_*.csv"))) == 6
          PY
