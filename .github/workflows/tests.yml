name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pytest pulp

      - name: Run tests
        run: pytest -q

      - name: Run the paper-style experiment smoke test
        run: |
          python experiments/reproduce_paper_results.py \
            --input data/example_players.csv \
            --risk-values 0 2 \
            --solver pulp \
            --output-dir /tmp/dream11-paper-experiments
          test -f /tmp/dream11-paper-experiments/experiment_summary.csv
          test -f /tmp/dream11-paper-experiments/run_metadata.json
